<!DOCTYPE html>
<html>
<head>
    <title>Edit Child</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="topbar">
        <div class="topbar-title">Daycare Attendance Management System</div>
        <div class="topbar-user">Logged in as {{ username }} ({{ role }})</div>
    </div>

    <div class="container">
        <h1>Edit Child</h1>

        <form method="POST">
            <label>Child Name</label>
            <input type="text" name="name" value="{{ child['name'] }}" required>

            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" value="{{ child['date_of_birth'] }}">

            <label>Grade</label>
            <input type="text" name="grade" value="{{ child['grade'] }}">

            <label>Age</label>
            <input type="number" name="age" value="{{ child['age'] }}" required>

            <label>Schedule Type</label>
            <select name="schedule_type">
                <option value="Full Day" {% if child['schedule_type'] == 'Full Day' %}selected{% endif %}>Full Day</option>
                <option value="Half Day" {% if child['schedule_type'] == 'Half Day' %}selected{% endif %}>Half Day</option>
                <option value="School Age" {% if child['schedule_type'] == 'School Age' %}selected{% endif %}>School Age</option>
            </select>

            <label>Parent Login Account</label>
            <select name="parent_user_id">
                <option value="">No parent selected</option>
                {% for parent in parents %}
                    <option value="{{ parent['id'] }}"
                        {% if child['parent_user_id'] == parent['id'] %}selected{% endif %}>
                        {{ parent['username'] }}
                    </option>
                {% endfor %}
            </select>

            <label>Parent Name</label>
            <input type="text" name="parent_name" value="{{ child['parent_name'] }}">

            <label>Parent Address</label>
            <input type="text" name="parent_address" value="{{ child['parent_address'] }}">

            <label>Parent Phone Number</label>
            <input type="text" name="parent_phone" value="{{ child['parent_phone'] }}">

            <label>Emergency Contact</label>
            <input type="text" name="emergency_contact" value="{{ child['emergency_contact'] }}">

            <label>Immunization Status</label>
            <select name="immunization_status">
                <option value="Updated" {% if child['immunization_status'] == 'Updated' %}selected{% endif %}>Updated</option>
                <option value="Needs Update" {% if child['immunization_status'] == 'Needs Update' %}selected{% endif %}>Needs Update</option>
                <option value="Pending" {% if child['immunization_status'] == 'Pending' %}selected{% endif %}>Pending</option>
            </select>

            <button type="submit">Update Child</button>
        </form>

        <p style="margin-top:20px;"><a href="/admin/children">Back to Manage Children</a></p>
        <p><a href="/logout">Logout</a></p>
    </div>
</body>
</html>
